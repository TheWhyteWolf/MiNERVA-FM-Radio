# MiNERVA-FM — same-origin reverse proxy (TLS). Runs on the VPS.
# Serves radio.html, the Icecast stream at /stream, and the SSE feed at /events,
# all under ONE https origin — so no CORS and no mixed-content in the browser.

server {
    listen 80;
    server_name radio.example.com;            # <-- your domain
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name radio.example.com;            # <-- your domain

    # certbot --nginx will fill these in:
    ssl_certificate     /etc/letsencrypt/live/radio.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/radio.example.com/privkey.pem;

    root /var/www/minerva-fm;                  # copy radio.html here
    index radio.html;

    location = / { try_files /radio.html =404; }

    # Live audio → local Icecast mount
    location /stream {
        proxy_pass http://127.0.0.1:8000/stream;
        proxy_buffering off;
        proxy_set_header Host $host;
    }

    # Now-playing → Server-Sent Events from the metadata bridge
    location /events {
        proxy_pass http://127.0.0.1:8088/events;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 1h;
    }

    # Track updates pushed by the radio host (bridge checks the Bearer token)
    location /meta/update {
        proxy_pass http://127.0.0.1:8088/update;
        proxy_set_header Authorization $http_authorization;
    }
}
