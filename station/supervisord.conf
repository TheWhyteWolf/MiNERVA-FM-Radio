[supervisord]
nodaemon=true
user=root
logfile=/dev/null
logfile_maxbytes=0
pidfile=/run/supervisord.pid

[unix_http_server]
file=/run/supervisor.sock
[supervisorctl]
serverurl=unix:///run/supervisor.sock
[rpcinterface:supervisor]
supervisor.rpcinterface_factory = supervisor.rpcinterface:make_main_rpcinterface

[program:icecast]
command=icecast2 -c /etc/icecast2/icecast.xml
user=icecast2
priority=10
autorestart=true
startsecs=3
startretries=50
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:bridge]
command=node /app/metadata-bridge.mjs
environment=BRIDGE_PORT="8088",ICECAST_STATUS="http://127.0.0.1:8000/status-json.xsl",ICECAST_MOUNT="/stream"
priority=20
autorestart=true
startsecs=2
startretries=50
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:nginx]
command=nginx -g "daemon off;"
priority=30
autorestart=true
startsecs=2
startretries=50
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:encoder]
command=bash -c 'exec ffmpeg -hide_banner -loglevel warning -re -f s16le -ar 44100 -ac 2 -i /tmp/radio.pcm -c:a libmp3lame -b:a "${STREAM_BITRATE:-128k}" -f mp3 -content_type audio/mpeg -ice_name "MiNERVA-FM" -ice_genre "Video Game Music" "icecast://source:${ICECAST_SOURCE_PASS}@127.0.0.1:8000/stream"'
priority=35
autorestart=true
startsecs=3
startretries=100000
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:station]
command=/app/station.sh
environment=MUSIC_DIR="/music",BRIDGE_URL="http://127.0.0.1:8088/update"
priority=40
autorestart=true
startsecs=5
startretries=100000
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
