# MiNERVA-FM web host — plain-HTTP same-origin proxy for the container (port 8080).
# (For public TLS, use server/nginx.conf + certbot on a VPS instead.)
server {
    listen 8080 default_server;
    server_name _;

    root /var/www/minerva-fm;
    index radio.html;

    location = / { try_files /radio.html =404; }

    # Live audio → local Icecast mount
    location /stream {
        proxy_pass http://127.0.0.1:8000/stream;
        proxy_buffering off;
        proxy_set_header Host $host;
    }

    # Now-playing → SSE from the metadata bridge
    location /events {
        proxy_pass http://127.0.0.1:8088/events;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_read_timeout 1h;
    }

    # Track updates pushed by the radio host
    location /meta/update {
        proxy_pass http://127.0.0.1:8088/update;
        proxy_set_header Authorization $http_authorization;
    }
}
